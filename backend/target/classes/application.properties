# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:user_management_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Uncomment and configure the following lines if you want to use MySQL instead:
# spring.datasource.url=jdbc:mysql://localhost:3306/user_management_db
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=MySecretKeyForJWTTokenGenerationAndValidationMustBeAtLeast32Characters
jwt.expiration=86400000

# Application
spring.application.name=user-management-system
