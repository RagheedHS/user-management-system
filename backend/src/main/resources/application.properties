# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:user_management_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Uncomment and configure the following lines if you want to use MySQL instead:
# spring.datasource.url=jdbc:mysql://localhost:3306/user_management_db
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
# Set the real secret via the JWT_SECRET environment variable in any non-local environment.
# The fallback below is only for local development against the in-memory H2 database.
jwt.secret=${JWT_SECRET:dev-only-local-secret-change-me-before-deploying-32chars}
jwt.expiration=86400000

# Application
spring.application.name=user-management-system

# Security controls (IP allow-list, rate limits, connection limits)
# Comma-separated IPs or CIDRs. Empty = disabled (allow all).
security.ip-allowlist=

# Rate limiting (simple in-memory implementation)
security.rate-limit.enabled=true
security.rate-limit.requests-per-minute=120
security.rate-limit.login-requests-per-minute=60

# Maximum concurrent API connections allowed (simple global semaphore)
security.connection-limit.max-concurrent=200

# Management endpoints
# management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Enforce HTTPS if behind TLS termination by setting true in production
security.require-https=false

# Prometheus scrape endpoint (micrometer)
# Expose the metrics endpoint for Prometheus scraping; secure it in production.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true

# Prometheus protection: IP allowlist or basic auth
management.metrics.allowlist=127.0.0.1
management.metrics.basic-auth.enabled=false
management.metrics.basic-auth.username=metrics
management.metrics.basic-auth.password=changeme
